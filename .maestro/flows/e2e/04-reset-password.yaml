# E2E: restablecer contraseña con token (del log de desarrollo).
# Env: APP_URL, RESET_TOKEN, E2E_NEW_PASSWORD
url: ${APP_URL}/reset-password?token=${RESET_TOKEN}
name: E2E — reset password
tags:
  - e2e
  - auth
  - web
---
- launchApp:
    clearState: true
- assertVisible: "Restablecer contraseña"
- tapOn:
    id: "newPassword"
- inputText: ${E2E_NEW_PASSWORD}
# El H1 y el botón comparten el mismo texto — apuntar al botón bajo el campo.
- tapOn:
    text: "Restablecer contraseña"
    below:
      id: "newPassword"
- extendedWaitUntil:
    visible: "Iniciá sesión"
    timeout: 15000
