# E2E: solicitar reset de contraseña (mensaje genérico, sin email real).
# Env: APP_URL, E2E_EMAIL
# Tras correr: leer el URL del log del server (`[auth] Password reset requested`).
url: ${APP_URL}/forgot-password
name: E2E — forgot password
tags:
  - e2e
  - auth
  - web
---
- launchApp:
    clearState: true
- assertVisible: "Recuperar contraseña"
- tapOn:
    id: "email"
- inputText: ${E2E_EMAIL}
- tapOn: "Enviar enlace"
- extendedWaitUntil:
    visible: "Si el email está registrado, recibirás un enlace para restablecer tu contraseña."
    timeout: 10000
