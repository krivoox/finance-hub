# E2E: login con la contraseña nueva post-reset.
# Env: APP_URL, E2E_EMAIL, E2E_NEW_PASSWORD
url: ${APP_URL}/login
name: E2E — login con password nueva
tags:
  - e2e
  - auth
  - web
---
- launchApp:
    clearState: true
- assertVisible: "Iniciá sesión"
- tapOn:
    id: "email"
- inputText: ${E2E_EMAIL}
- tapOn:
    id: "password"
- inputText: ${E2E_NEW_PASSWORD}
- tapOn: "Iniciar sesión"
- extendedWaitUntil:
    visible: "Tu espacio está casi listo"
    timeout: 15000
